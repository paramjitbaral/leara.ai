<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leara.ai</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>

<body class="light">
  <style>
    #initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background-color: #0c0c0c;
      transition: background-color 0.3s;
    }
    body.light #initial-loader {
      background-color: #ffffff;
    }
    .loader-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .loader-text {
      margin-top: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      opacity: 0.8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    body.light .loader-text {
      color: #18181b;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.95); }
    }
  </style>
  <div id="root">
    <div id="initial-loader">
      <img src="/logo.png" class="loader-logo" alt="Leara.ai" />
      <div class="loader-text">Leara.ai</div>
    </div>
  </div>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('app-theme');
      if (savedTheme === 'dark') {
        document.body.classList.remove('light');
      } else if (savedTheme === 'light') {
        document.body.classList.add('light');
        document.getElementById('initial-loader').style.backgroundColor = '#ffffff';
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
